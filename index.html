<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>学习伙伴</title>
<style>
  /*━━━ Material You 3 Theme ━━━*/
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --on-surface: #1f1f1f;
    --on-surface-variant: #646464;
    --outline: #e0e0e0;
    --primary: #2563eb;
    --on-primary: #ffffff;
    --primary-container: #dbeafe;
    --on-primary-container: #1e40af;
    --secondary: #7c3aed;
    --secondary-container: #ede9fe;
    --tertiary: #059669;
    --tertiary-container: #d1fae5;
    --error: #dc2626;
    --error-container: #fee2e2;
    --green: #16a34a;
    --green-container: #dcfce7;
    --amber: #d97706;
    --amber-container: #fef3c7;
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 20px;
    --elevation-1: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --elevation-2: 0 3px 6px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.06);
    --elevation-3: 0 8px 16px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --on-surface: #f2f2f2;
      --on-surface-variant: #a1a1a6;
      --outline: #38383a;
      --primary: #60a5fa;
      --on-primary: #0a0a0a;
      --primary-container: #1e3a5f;
      --on-primary-container: #93c5fd;
      --secondary: #a78bfa;
      --secondary-container: #3b2f6e;
      --tertiary: #34d399;
      --tertiary-container: #064e3b;
      --error: #f87171;
      --error-container: #7f1d1d;
      --green: #4ade80;
      --green-container: #14532d;
      --amber: #fbbf24;
      --amber-container: #713f12;
      --elevation-1: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
      --elevation-2: 0 4px 8px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
      --elevation-3: 0 8px 16px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3);
    }
  }

  /*━━━ Reset ━━━*/
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--on-surface);
    min-height: 100dvh;
    line-height: 1.6;
  }

  /*━━━ App Bar ━━━*/
  .appbar {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 4px 4px; min-height: 56px;
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
  }
  .appbar .back {
    width: 44px; height: 44px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    background: none; border: none; border-radius: 50%;
    color: var(--on-surface); font-size: 22px; cursor: pointer;
    transition: background var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .appbar .back:active { background: var(--surface2); }
  .appbar .title { font-size: 20px; font-weight: 600; flex: 1; }
  .appbar .spacer { width: 44px; flex-shrink: 0; }

  /*━━━ Page container ━━━*/
  .page { display: none; padding: 0 16px 24px; }
  .page.active { display: block; }
  .page-home { max-width: 600px; margin: 0 auto; }
  .page-sub { max-width: 600px; margin: 0 auto; }

  /*━━━ Subject cards ━━━*/
  .subtitle {
    font-size: 14px; color: var(--on-surface-variant);
    padding: 4px 4px 12px;
  }
  .card-grid { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 18px 20px; cursor: pointer;
    box-shadow: var(--elevation-1); transition: box-shadow var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { box-shadow: var(--elevation-2); }
  .card-row { display: flex; align-items: center; gap: 14px; }
  .card-icon {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .card-icon.blue { background: var(--primary-container); }
  .card-icon.purple { background: var(--secondary-container); }
  .card-icon.green { background: var(--tertiary-container); }
  .card-icon.amber { background: var(--amber-container); }

  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-meta { font-size: 13px; color: var(--on-surface-variant); margin-top: 2px; }

  .chip {
    display: flex; flex-direction: column; align-items: center;
    padding: 5px 12px; border-radius: 10px; margin-top: 4px;
    flex-shrink: 0; min-width: 56px; line-height: 1.3;
  }
  .chip-progress { font-size: 15px; font-weight: 700; }
  .chip-pct { font-size: 11px; font-weight: 500; opacity: .8; }
  .chip-new { background: var(--primary-container); color: var(--on-primary-container); }
  .chip-doing { background: var(--amber-container); color: var(--amber); }
  .chip-done { background: var(--green-container); color: var(--green); }

  /*━━━ Session list ━━━*/
  .session-card {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 16px 18px; cursor: pointer;
    box-shadow: var(--elevation-1); transition: box-shadow var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .session-card:active { box-shadow: var(--elevation-2); }
  .session-date { font-size: 15px; font-weight: 600; }
  .session-label { font-size: 13px; color: var(--on-surface-variant); margin-top: 2px; }
  .session-progress { font-size: 12px; color: var(--primary); margin-top: 8px; }

  .progress-bar {
    height: 4px; background: var(--surface2); border-radius: 4px;
    margin-top: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    background: var(--primary); transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /*━━━ Quiz header ━━━*/
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0 16px; margin-bottom: 12px;
    border-bottom: 1px solid var(--outline);
  }
  .quiz-header .info { font-size: 13px; color: var(--on-surface-variant); }
  .quiz-header .section {
    font-size: 12px; font-weight: 500;
    background: var(--primary-container); color: var(--on-primary-container);
    padding: 3px 10px; border-radius: 8px;
  }

  /*━━━ Question ━━━*/
  .q-number { font-size: 13px; color: var(--on-surface-variant); margin-bottom: 10px; }
  .q-text {
    font-size: 18px; font-weight: 600; line-height: 1.7;
    margin-bottom: 28px;
  }

  /*━━━ Answer ━━━*/
  .answer-area { display: none; }
  .answer-area.show { display: block; }

  .answer-box {
    background: var(--tertiary-container); border-radius: var(--radius-md);
    padding: 16px; margin-bottom: 12px;
  }
  .answer-box .label {
    font-size: 12px; font-weight: 600; letter-spacing: .5px;
    color: var(--tertiary); text-transform: uppercase; margin-bottom: 6px;
  }
  .answer-box .content { font-size: 15px; line-height: 1.7; }

  .tips-box {
    background: var(--amber-container); border-radius: var(--radius-md);
    padding: 14px 16px; margin-bottom: 24px;
  }
  .tips-box .label {
    font-size: 12px; font-weight: 600; letter-spacing: .5px;
    color: var(--amber); text-transform: uppercase; margin-bottom: 4px;
  }
  .tips-box .content { font-size: 14px; line-height: 1.6; }

  /*━━━ Buttons ━━━*/
  .btn-group { display: flex; gap: 10px; }

  .btn {
    flex: 1; border: none; border-radius: var(--radius-sm);
    padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform .1s, opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.97); }

  .btn-filled { background: var(--primary); color: var(--on-primary);
    box-shadow: var(--elevation-1); }
  .btn-text { background: transparent; color: var(--primary); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-red { background: var(--error); color: #fff; }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--outline);
    color: var(--on-surface);
  }

  .btn-nav {
    flex: 1; background: var(--surface); color: var(--on-surface);
    border: none; border-radius: var(--radius-sm);
    padding: 14px; font-size: 15px; font-weight: 500;
    cursor: pointer; box-shadow: var(--elevation-1);
    transition: opacity .15s, box-shadow var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-nav:active { box-shadow: var(--elevation-2); }
  .btn-nav:disabled { opacity: .35; }

  /*━━━ Result ━━━*/
  .result-box {
    text-align: center; padding: 40px 16px; margin-bottom: 12px;
  }
  .result-box .score {
    font-size: 56px; font-weight: 700; color: var(--primary);
    line-height: 1;
  }
  .result-box .score-sub {
    font-size: 15px; color: var(--on-surface-variant);
    margin: 10px 0 28px;
  }

  .wrong-item {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 16px; margin-bottom: 10px;
    box-shadow: var(--elevation-1);
  }
  .wrong-item .q { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .wrong-item .a { font-size: 14px; color: var(--on-surface-variant); }

  /*━━━ Utilities ━━━*/
  .hidden { display: none !important; }
  .mt-24 { margin-top: 24px; }
</style>
</head>
<body>

<div id="app">
  <!-- Page 1: Subjects -->
  <div id="page-home" class="page page-home active">
    <div class="appbar"><div class="title">学习伙伴</div></div>
    <div class="subtitle">选择一个科目开始答题</div>
    <div class="card-grid" id="subject-list"></div>
  </div>

  <!-- Page 2: Sessions -->
  <div id="page-sessions" class="page page-sub">
    <div class="appbar">
      <button class="back" id="back-home">‹</button>
      <span class="title" id="session-title">地理</span>
      <div class="spacer"></div>
    </div>
    <div id="session-list" class="card-grid"></div>
  </div>

  <!-- Page 3: Quiz -->
  <div id="page-quiz" class="page page-sub">
    <div class="appbar">
      <button class="back" id="back-sessions">‹</button>
      <span class="title" id="quiz-title">地理</span>
      <div class="spacer"></div>
    </div>

    <div class="quiz-header">
      <span class="info" id="quiz-progress">第 1/43 题</span>
      <span class="section" id="quiz-section">行政区划</span>
    </div>

    <div id="question-area">
      <div class="q-number" id="q-number">#1</div>
      <div class="q-text" id="q-text">问题加载中...</div>

      <button class="btn btn-filled" id="btn-show-answer">显示答案</button>

      <div class="answer-area" id="answer-area">
        <div class="answer-box">
          <div class="label">正确答案</div>
          <div class="content" id="answer-text"></div>
        </div>
        <div class="tips-box">
          <div class="label">记忆提示</div>
          <div class="content" id="tips-text"></div>
        </div>
        <div class="btn-group">
          <button class="btn btn-green" id="btn-correct">答对了</button>
          <button class="btn btn-red" id="btn-wrong">答错了</button>
        </div>
      </div>

      <div class="mt-24">
        <div class="btn-group">
          <button class="btn-nav" id="btn-prev">‹ 上一题</button>
          <button class="btn-nav" id="btn-next">下一题 ›</button>
        </div>
      </div>
    </div>

    <div id="result-area" class="hidden">
      <div class="result-box">
        <div class="score" id="result-score">0%</div>
        <div class="score-sub" id="result-detail">答对 0/0 题</div>
        <div class="btn-group" style="justify-content:center;gap:10px;">
          <button class="btn btn-filled" id="btn-retry-wrong" style="flex:0 1 auto;padding:12px 20px;">重刷错题</button>
          <button class="btn btn-outline" id="btn-retry-all" style="flex:0 1 auto;padding:12px 20px;">全部重来</button>
        </div>
      </div>
      <h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">错题本</h3>
      <div id="wrong-list"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_PREFIX = 'quiz_progress_';
let data = null;
let currentSubject = null;
let currentSession = null;
let currentIndex = 0;
let answers = {};
let isAnswered = false;

async function loadData() {
  try {
    const res = await fetch('/study-quiz/questions.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    renderSubjects();
  } catch(e) {
    const el = document.getElementById('subject-list');
    el.textContent = '';
    const div = document.createElement('div');
    div.style.cssText = 'color:var(--error);text-align:center;padding:40px 0;';
    div.textContent = '题库加载失败 (' + e.message + ')';
    el.appendChild(div);
  }
}

function getProgressKey(subjectId, date) {
  return STORAGE_PREFIX + subjectId + '_' + date;
}

function loadProgress(subjectId, date) {
  const key = getProgressKey(subjectId, date);
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      const p = JSON.parse(saved);
      answers = p.answers || {};
      currentIndex = p.currentIndex || 0;
      return;
    }
  } catch(e) {}
  answers = {};
  currentIndex = 0;
}

function saveProgress(subjectId, date) {
  const key = getProgressKey(subjectId, date);
  localStorage.setItem(key, JSON.stringify({ answers, currentIndex }));
}

function getStats(subjectId, date, questions) {
  const key = getProgressKey(subjectId, date);
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      const p = JSON.parse(saved);
      const ans = p.answers || {};
      const total = Object.keys(ans).length;
      const correct = Object.values(ans).filter(v => v === 'correct').length;
      return { done: total, correct, total, all: questions.length };
    }
  } catch(e) {}
  return { done: 0, correct: 0, total: 0, all: questions.length };
}

const ICONS = ['blue','purple','green','amber'];

function renderSubjects() {
  const el = document.getElementById('subject-list');
  el.innerHTML = data.subjects.map((s, i) => {
    const allQ = s.sessions.reduce((a, sess) => a + sess.questions.length, 0);
    let totalDone = 0, totalCorrect = 0;
    s.sessions.forEach(sess => {
      const st = getStats(s.id, sess.date, sess.questions);
      totalDone += st.done;
      totalCorrect += st.correct;
    });
    const isComplete = totalDone > 0 && totalDone === allQ;
    const status = totalDone === 0 ? 'new' : isComplete ? 'done' : 'doing';

    let chipHtml;
    if (totalDone === 0) {
      chipHtml = `<span class="chip chip-${status}"><span class="chip-progress">0/${allQ}</span><span class="chip-pct">未开始</span></span>`;
    } else {
      const pct = Math.round(totalCorrect / totalDone * 100);
      chipHtml = `<span class="chip chip-${status}"><span class="chip-progress">${totalDone}/${allQ}</span><span class="chip-pct">正确率 ${pct}%</span></span>`;
    }

    const iconCls = ICONS[i % ICONS.length];
    return `
      <div class="card" onclick="selectSubject('${s.id}')">
        <div class="card-row">
          <div class="card-icon ${iconCls}">${s.icon || '📖'}</div>
          <div class="card-body">
            <div class="card-name">${s.name}</div>
            <div class="card-meta">${s.sessions.length} 个学习日 · ${allQ} 题</div>
            ${chipHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function selectSubject(subjectId) {
  currentSubject = data.subjects.find(s => s.id === subjectId);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-sessions').classList.add('active');
  document.getElementById('session-title').textContent = currentSubject.name;
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('session-list');
  el.innerHTML = currentSubject.sessions.map(sess => {
    const st = getStats(currentSubject.id, sess.date, sess.questions);
    const pct = st.all > 0 ? Math.round(st.done / st.all * 100) : 0;
    return `
      <div class="session-card" onclick="selectSession('${sess.date}')">
        <div class="session-date">${sess.date}</div>
        <div class="session-label">${sess.label || ''} · ${sess.questions.length} 题</div>
        <div class="session-progress">已答 ${st.done}/${st.all} · 正确 ${st.correct}/${st.done}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function selectSession(date) {
  currentSession = currentSubject.sessions.find(s => s.date === date);
  loadProgress(currentSubject.id, date);
  currentIndex = Math.min(currentIndex, currentSession.questions.length - 1);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-quiz').classList.add('active');
  document.getElementById('quiz-title').textContent = currentSubject.name;
  isAnswered = false;
  renderQuestion();
}

function renderQuestion() {
  if (!currentSession || currentIndex >= currentSession.questions.length) {
    showResult();
    return;
  }
  const q = currentSession.questions[currentIndex];
  document.getElementById('quiz-progress').textContent =
    `第 ${currentIndex + 1}/${currentSession.questions.length} 题`;
  document.getElementById('quiz-section').textContent = q.section || '';
  document.getElementById('q-number').textContent = `#${currentIndex + 1}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('answer-text').textContent = q.answer;
  document.getElementById('tips-text').textContent = q.tips || '无';

  const area = document.getElementById('answer-area');
  const showBtn = document.getElementById('btn-show-answer');

  if (answers[q.id]) {
    area.classList.add('show');
    showBtn.classList.add('hidden');
    isAnswered = true;
  } else {
    area.classList.remove('show');
    showBtn.classList.remove('hidden');
    isAnswered = false;
  }

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = false;
  document.getElementById('question-area').classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');
}

document.getElementById('btn-show-answer').addEventListener('click', function() {
  const q = currentSession.questions[currentIndex];
  if (answers[q.id]) return;
  document.getElementById('answer-area').classList.add('show');
  this.classList.add('hidden');
  isAnswered = true;
});

document.getElementById('btn-correct').addEventListener('click', function() {
  if (!isAnswered) return;
  answers[currentSession.questions[currentIndex].id] = 'correct';
  saveProgress(currentSubject.id, currentSession.date);
  setTimeout(() => goNext(), 300);
});

document.getElementById('btn-wrong').addEventListener('click', function() {
  if (!isAnswered) return;
  answers[currentSession.questions[currentIndex].id] = 'wrong';
  saveProgress(currentSubject.id, currentSession.date);
  setTimeout(() => goNext(), 300);
});

function goNext() {
  if (currentIndex < currentSession.questions.length - 1) {
    currentIndex++;
    isAnswered = false;
    renderQuestion();
  } else {
    renderQuestion();
  }
}

document.getElementById('btn-next').addEventListener('click', goNext);

document.getElementById('btn-prev').addEventListener('click', function() {
  if (currentIndex > 0) {
    currentIndex--;
    isAnswered = false;
    renderQuestion();
  }
});

function showResult() {
  document.getElementById('question-area').classList.add('hidden');
  document.getElementById('result-area').classList.remove('hidden');

  const all = currentSession.questions;
  let correct = 0, wrong = 0;
  const wrongList = [];
  all.forEach(q => {
    if (answers[q.id] === 'correct') correct++;
    else if (answers[q.id] === 'wrong') { wrong++; wrongList.push(q); }
  });
  const done = correct + wrong;
  const pct = done > 0 ? Math.round(correct / done * 100) : 0;
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').textContent =
    `答对 ${correct}/${done} 题（共 ${all.length} 题，未答 ${all.length - done} 题）`;

  const wl = document.getElementById('wrong-list');
  if (wrongList.length === 0) {
    wl.innerHTML = '<div style="color:var(--green);font-size:15px;text-align:center;padding:8px 0;">全都答对了！</div>';
  } else {
    wl.innerHTML = wrongList.map(q => `
      <div class="wrong-item">
        <div class="q">${q.question}</div>
        <div class="a">正确答案：${q.answer}</div>
      </div>
    `).join('');
  }

  document.getElementById('btn-retry-wrong').classList.toggle('hidden', wrongList.length === 0);
  window._wrongList = wrongList;
}

document.getElementById('btn-retry-all').addEventListener('click', function() {
  answers = {};
  currentIndex = 0;
  saveProgress(currentSubject.id, currentSession.date);
  isAnswered = false;
  renderQuestion();
});

document.getElementById('btn-retry-wrong').addEventListener('click', function() {
  const wrong = window._wrongList || [];
  if (wrong.length === 0) return;
  currentSession = {
    date: currentSession.date + '-wrong',
    label: '错题重刷',
    questions: wrong
  };
  answers = {};
  currentIndex = 0;
  isAnswered = false;
  renderQuestion();
});

document.getElementById('back-home').addEventListener('click', function() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  renderSubjects();
});

document.getElementById('back-sessions').addEventListener('click', function() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-sessions').classList.add('active');
  renderSessions();
});

document.addEventListener('keydown', function(e) {
  const quiz = document.getElementById('page-quiz');
  if (!quiz.classList.contains('active')) return;
  if (e.key === 'ArrowRight' && !document.getElementById('btn-next').disabled) {
    goNext();
  } else if (e.key === 'ArrowLeft' && !document.getElementById('btn-prev').disabled) {
    document.getElementById('btn-prev').click();
  } else if (e.key === ' ' && !isAnswered) {
    e.preventDefault();
    document.getElementById('btn-show-answer').click();
  }
});

loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>学习伙伴</title>
<link rel="stylesheet" href="/study-quiz/lib/leaflet.min.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232c3e5c'/%3E%3Cpath d='M8 8h12c.55 0 1 .45 1 1v14c0 .55-.45 1-1 1H8c-.55 0-1-.45-1-1V9c0-.55.45-1 1-1z' fill='%23fffcf8' stroke='%23fffcf8' stroke-width='.5'/%3E%3Cpath d='M11 11h6v2h-6zm0 4h6v2h-6zm0 4h4v2h-4z' fill='%232c3e5c'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #fffcf8;
    --surface2: #ece7e0;
    --ink: #2c2a28;
    --ink-muted: #8a837c;
    --ink-lighter: #b5aea7;
    --border: #e5dfd7;
    --ink-blue: #2c3e5c;
    --ink-blue-light: #e5eaf0;
    --ink-blue-bright: #3b5a82;
    --amber: #c98d3a;
    --amber-light: #f5ecdc;
    --green: #4a7c62;
    --green-light: #e4efe9;
    --red: #b5514a;
    --red-light: #f2e3e1;
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181714;
      --surface: #24221e;
      --surface2: #2f2d28;
      --ink: #e8e2da;
      --ink-muted: #8f8980;
      --ink-lighter: #5f5a52;
      --border: #36332e;
      --ink-blue: #7c9cc6;
      --ink-blue-light: #2a3340;
      --ink-blue-bright: #a0b8d6;
      --amber: #d4a24e;
      --amber-light: #3a3224;
      --green: #6ca883;
      --green-light: #28382e;
      --red: #d06a60;
      --red-light: #3d2825;
    }
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Noto Sans SC", -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    line-height: 1.65;
    -webkit-tap-highlight-color: transparent;
  }

  .bar {
    display: flex; align-items: center; gap: 6px;
    padding: 14px 6px 6px; min-height: 56px;
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
  }
  .bar-btn {
    width: 40px; height: 40px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    background: none; border: none; border-radius: 12px;
    color: var(--ink); font-size: 22px; cursor: pointer;
    transition: background .15s;
  }
  .bar-btn:active { background: var(--surface2); }
  .bar-title { font-size: 18px; font-weight: 600; flex: 1; letter-spacing: -.01em; }
  .bar-end { width: 40px; flex-shrink: 0; }

  .page { display: none; padding: 0 18px 24px; }
  .page.active { display: block; }
  .padded { max-width: 560px; margin: 0 auto; }

  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .card, .row, .stat-card { animation: slideUp .35s ease-out both; }
  .card:nth-child(2) { animation-delay: .05s; }
  .card:nth-child(3) { animation-delay: .1s; }
  .card:nth-child(4) { animation-delay: .15s; }
  .card:nth-child(5) { animation-delay: .2s; }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px 10px; text-align: center; border: 1px solid var(--border); }
  .stat-card .v { font-family: "Outfit", sans-serif; font-size: 22px; font-weight: 700; line-height: 1.2; }
  .stat-card .l { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
  .stat-blue .v { color: var(--ink-blue); }
  .stat-amber .v { color: var(--amber); }
  .stat-green .v { color: var(--green); }

  .hello { font-family: "Outfit", sans-serif; font-size: 26px; font-weight: 700; padding: 10px 4px 2px; letter-spacing: -.02em; }
  .hello-sub { font-size: 14px; color: var(--ink-muted); padding: 0 4px 16px; }

  /* Home actions */
  .home-actions { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
  .home-actions .btn { width: 100%; padding: 12px; }
  .home-actions-row { display: flex; gap: 8px; }
  .home-actions-row .btn { flex: 1; }

  .card-row { display: flex; align-items: center; gap: 14px; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px 18px; border: 1px solid var(--border); cursor: grab; user-select: none; -webkit-user-select: none; transition: transform .25s cubic-bezier(.2,0,0,1), box-shadow .25s ease, opacity .2s ease; }
  .card.dragging { opacity: .7; box-shadow: 0 8px 25px rgba(0,0,0,.12); transform: scale(1.02); z-index: 10; position: relative; }
  .card.drop-before { transform: translateY(8px); }
  .card.drop-after { transform: translateY(-8px); }
  .sort-indicator { height: 3px; background: var(--ink-blue); border-radius: 2px; margin: -2px 0; opacity: 0; transition: opacity .2s ease; pointer-events: none; }
  .sort-indicator.show { opacity: 1; }
  .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-icon.blue { background: var(--ink-blue-light); }
  .card-icon.amber { background: var(--amber-light); }
  .card-icon.green { background: var(--green-light); }
  .card-icon.red { background: var(--red-light); }
  .card-body { flex: 1; min-width: 0; }
  .ans table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .ans th { background: var(--surface2); padding: 6px 8px; text-align: left; font-weight: 600; white-space: nowrap; }
  .ans td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .ans .tb-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .card-name { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-meta { font-size: 13px; color: var(--ink-muted); margin-top: 1px; }

  .stamp { display: flex; flex-direction: column; align-items: center; padding: 6px 12px; border-radius: var(--radius-sm); flex-shrink: 0; min-width: 52px; }
  .stamp-num { font-family: "Outfit", sans-serif; font-size: 16px; font-weight: 700; line-height: 1.2; }
  .stamp-lbl { font-size: 10px; font-weight: 600; opacity: .75; line-height: 1.2; }
  .stamp-new { background: var(--ink-blue-light); color: var(--ink-blue); }
  .stamp-doing { background: var(--amber-light); color: var(--amber); }
  .stamp-done { background: var(--green-light); color: var(--green); }

  .row { background: var(--surface); border-radius: var(--radius); padding: 15px 18px; cursor: pointer; border: 1px solid var(--border); transition: border-color .15s, transform .1s; display: flex; align-items: center; gap: 12px; }
  .row:active { transform: scale(.985); }
  .row-body { flex: 1; min-width: 0; }
  .row-date { font-size: 14px; font-weight: 600; }
  .row-meta { font-size: 13px; color: var(--ink-muted); margin-top: 1px; }
  .row-stat { font-size: 12px; color: var(--ink-blue); margin-top: 8px; }
  .track { height: 4px; background: var(--surface2); border-radius: 4px; margin-top: 10px; overflow: hidden; }
  .track-fill { height: 100%; border-radius: 4px; background: var(--ink-blue); transition: width .5s cubic-bezier(.4,0,.2,1); }
  .row-reset {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px;
    border: 1.5px solid var(--ink-lighter); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; color: var(--ink-muted);
    transition: border-color .15s, color .15s, background .15s;
  }
  .row-reset:active { border-color: var(--red); color: var(--red); background: var(--red-light); }

  .quiz-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
  .quiz-head .pos { font-family: "Outfit", sans-serif; font-size: 13px; font-weight: 500; color: var(--ink-muted); }
  .quiz-head .tag { font-size: 11px; font-weight: 600; background: var(--ink-blue-light); color: var(--ink-blue); padding: 3px 10px; border-radius: 8px; }
  .qn { font-size: 13px; color: var(--ink-lighter); margin-bottom: 10px; font-family: "Outfit", sans-serif; }
  .q { font-size: 18px; font-weight: 600; line-height: 1.7; margin-bottom: 28px; letter-spacing: .01em; }
  .reveal { display: none; }
  .reveal.show { display: block; animation: fadeIn .25s ease-out; }
  .ans { background: var(--green-light); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border-left: 3px solid var(--green); }
  .ans .hl { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .ans .body { font-size: 15px; line-height: 1.7; }
  .tip { background: var(--amber-light); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 24px; border-left: 3px solid var(--amber); }
  .tip .hl { font-size: 11px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .tip .body { font-size: 14px; line-height: 1.6; }

  .g { display: flex; gap: 10px; }
  .btn { flex: 1; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .1s; font-family: inherit; }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--ink-blue); color: #fff; }
  .btn-correct { background: var(--green); color: #fff; }
  .btn-wrong { background: var(--red); color: #fff; }
  .btn-out { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
  .btn-amber { background: var(--amber); color: #fff; }
  .nav-btn { flex: 1; background: var(--surface); color: var(--ink); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: border-color .15s; }
  .nav-btn:active { border-color: var(--ink-lighter); }
  .nav-btn:disabled { opacity: .3; }
  .mt { margin-top: 24px; }

  .result { text-align: center; padding: 40px 10px; margin-bottom: 8px; }
  .result .big { font-family: "Outfit", sans-serif; font-size: 56px; font-weight: 700; color: var(--ink-blue); line-height: 1; }
  .result .sub { font-size: 15px; color: var(--ink-muted); margin: 10px 0 28px; }

  .err { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
  .err .q { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .err .a { font-size: 14px; color: var(--ink-muted); }
  .slug { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

  /* Wrong bank */
  .wb-empty { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .wb-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .wb-empty .t { font-size: 16px; }
  .wb-group { margin-bottom: 16px; }
  .wb-subject { font-size: 14px; font-weight: 600; padding: 10px 4px 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .wb-subject .c { font-family: "Outfit", sans-serif; font-size: 12px; font-weight: 500; color: var(--ink-muted); margin-left: 6px; }
  .wb-item { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
  .wb-item .wb-q { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .wb-item .wb-a { font-size: 13px; color: var(--ink-muted); }
  .wb-item .wb-src { font-size: 11px; color: var(--ink-lighter); margin-top: 4px; }
  .wb-group .btn { margin-top: 8px; }

  /*━━━ TOC overlay ━━━*/
  .toc-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.35);
  }
  .toc-overlay.show { display: block; }
  .toc-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    max-height: 55vh; background: var(--surface);
    border-radius: 20px 20px 0 0; padding: 20px 20px 28px;
    animation: slideUp .25s ease-out;
    overflow-y: auto;
  }
  .toc-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--ink-lighter); margin: 0 auto 16px;
  }
  .toc-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .toc-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .toc-dot {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: "Outfit", sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: transform .1s;
  }
  .toc-dot:active { transform: scale(.9); }
  .toc-dot.blank { background: var(--surface2); color: var(--ink-muted); }
  .toc-dot.correct { background: var(--green-light); color: var(--green); }
  .toc-dot.wrong { background: var(--red-light); color: var(--red); }
  .toc-dot.current { box-shadow: 0 0 0 2px var(--ink-blue); }

  /*━━━ Notes ━━━*/
  .note-empty { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .note-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .note-empty .t { font-size: 16px; }
  .note-empty .s { font-size: 14px; margin-top: 4px; }
  /* List view */
  .note-entry {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 8px; cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color .15s;
  }
  .note-entry:active { border-color: var(--ink-lighter); }
  .note-entry .t { font-size: 15px; font-weight: 600; }
  .note-entry .m { font-size: 12px; color: var(--ink-lighter); margin-top: 2px; }
  /* Detail view */
  .note-detail { display: none; }
  .note-detail.show { display: block; }
  .note-detail .head {
    font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-top: 4px;
  }
  .note-detail .head .del {
    font-size: 13px; font-weight: 400; color: var(--ink-lighter); cursor: pointer;
    margin-left: 10px;
  }
  .note-detail .body {
    font-size: 15px; line-height: 1.8; color: var(--ink);
  }
  .note-detail .body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px; }
  .note-detail .body th, .note-detail .body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .note-detail .body th { background: var(--ink-blue-light); font-weight: 600; }
  .note-detail .body strong { font-weight: 700; }
  .note-detail .body ul { margin: 4px 0; padding-left: 18px; list-style: disc; }
  .note-detail .body ol { margin: 4px 0; padding-left: 18px; }
  .note-detail .body li { margin-bottom: 3px; }
  .note-detail .body blockquote { border-left: 3px solid var(--ink-blue); padding: 6px 12px; margin: 8px 0; background: var(--ink-blue-light); border-radius: 6px; }
  .note-detail .body code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
  .note-detail .body .md-h { font-weight: 700; margin: 10px 0 4px; font-size: 16px; }
  .note-detail .meta { font-size: 12px; color: var(--ink-lighter); margin-top: 16px; }

  /*━━━ Map ━━━*/
  /*━━━ Map ━━━*/
  #page-map { display: none; flex-direction: column; height: 100dvh; }
  #page-map.active { display: flex; }
  #map-container { flex: 1; z-index: 1; }
  .map-topbar { display: flex; gap: 8px; padding: 12px 14px 8px; flex-shrink: 0; background: var(--bg); }
  .map-topbar input { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; background: var(--surface); color: var(--ink); font-family: inherit; }
  .map-topbar input:focus { border-color: var(--ink-blue); }
  .map-topbar button { width: 40px; border: none; border-radius: 10px; background: var(--ink-blue); color: #fff; font-size: 16px; cursor: pointer; }
  .map-label { background: rgba(255,255,255,.85); border: none; box-shadow: 0 1px 4px rgba(0,0,0,.15); border-radius: 4px; padding: 2px 6px; font-size: 12px; font-weight: 600; color: #333; }
  .note-item .meta { font-size: 12px; color: var(--ink-lighter); margin-top: 8px; }
  .note-form { margin-bottom: 16px; }
  .note-form input, .note-form textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; font-size: 15px; outline: none;
    background: var(--surface); color: var(--ink); font-family: inherit;
    margin-bottom: 8px;
  }
  .note-form input:focus, .note-form textarea:focus { border-color: var(--ink-blue); }
  .note-form textarea { min-height: 100px; resize: vertical; }

  /*━━━ Chat bubble ━━━*/
  .chat-bubble {
    position: fixed; bottom: 20px; right: 20px; z-index: 90;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--ink-blue); color: #fff; border: none;
    font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .chat-bubble:active { transform: scale(.9); }

  .chat-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
    max-width: 480px; margin: 0 auto;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.15);
    display: none; flex-direction: column;
    max-height: 70vh; animation: slideUp .25s ease-out;
  }
  .chat-panel.open { display: flex; }

  .chat-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .chat-head .t { font-size: 15px; font-weight: 600; }
  .chat-head .x {
    width: 32px; height: 32px; border: none; background: none;
    font-size: 20px; cursor: pointer; border-radius: 8px;
    color: var(--ink-muted);
  }
  .chat-head .x:active { background: var(--surface2); }

  .chat-msgs {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    min-height: 200px; max-height: 50vh;
  }
  .chat-empty {
    text-align: center; padding: 40px 20px; color: var(--ink-lighter);
    font-size: 14px; line-height: 1.6;
  }
  .chat-msg { margin-bottom: 14px; display: flex; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg.ai { justify-content: flex-start; }

  .chat-bbl {
    max-width: 85%; padding: 10px 14px; border-radius: 14px;
    font-size: 15px; line-height: 1.6; word-break: break-word;
  }
  .chat-msg.user .chat-bbl {
    background: var(--ink-blue); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.ai {
    flex-direction: column; align-items: flex-start;
  }
  .chat-msg.ai .chat-bbl {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--border);
    border-left: 4px solid var(--ink-blue);
    border-radius: 4px 12px 12px 4px;
    line-height: 1.75;
  }
  .chat-msg.ai .copy-btn {
    font-size: 12px; color: var(--ink-lighter); cursor: pointer;
    padding: 4px 8px; margin-top: 2px; border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .chat-msg.ai .copy-btn:active { background: var(--surface2); color: var(--ink-muted); }
  .chat-msg.ai .chat-bbl strong { font-weight: 700; color: var(--ink); }
  .chat-msg.ai .chat-bbl ul { margin: 4px 0; padding-left: 18px; list-style: disc; }
  .chat-msg.ai .chat-bbl ol { margin: 4px 0; padding-left: 18px; }
  .chat-msg.ai .chat-bbl li { margin-bottom: 2px; }
  .chat-msg.ai .chat-bbl .md-h { font-weight: 700; margin: 8px 0 4px; }
  .chat-msg.ai .chat-bbl blockquote {
    border-left: 3px solid var(--ink-blue); padding: 6px 12px; margin: 8px 0;
    background: var(--ink-blue-light); border-radius: 6px; font-size: 14px;
  }
  .chat-msg.ai .chat-bbl table {
    width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px;
  }
  .chat-msg.ai .chat-bbl th, .chat-msg.ai .chat-bbl td {
    border: 1px solid var(--border); padding: 6px 10px; text-align: left;
  }
  .chat-msg.ai .chat-bbl th { background: var(--ink-blue-light); font-weight: 600; }
  .chat-msg.ai .chat-bbl code {
    background: var(--surface2); padding: 1px 5px; border-radius: 4px;
    font-size: 13px; font-family: "Outfit", monospace;
  }
  .chat-msg.ai .chat-bbl.thinking { color: var(--ink-muted); font-style: italic; }

<script>
const STORAGE_PREFIX = 'quiz_progress_';
const STATE_KEY = 'quiz_app_state';
let data = null;
let currentSubject = null;
let currentSession = null;
let currentIndex = 0;
let answers = {};
let isAnswered = false;
let sessionQuestions = null;


// ── Question Editor ──
function openQEditor(batchMode) {
  // Password: enter once, remembered on this browser
  const AUTH_KEY = 'qe_authed';
  const EDITOR_PW = 'wys123456';
  if (!localStorage.getItem(AUTH_KEY)) {
    const input = prompt('请输入编辑密码：');
    if (input !== EDITOR_PW) { alert('密码错误'); return; }
    localStorage.setItem(AUTH_KEY, '1');
  }
  document.getElementById('qe-overlay').classList.add('show');
  document.getElementById('qe-saved').style.display = 'none';
  
  // Toggle single vs batch mode
  var isBatch = batchMode === true;
  var singleFields = ['qe-question','qe-answer','qe-tips'];
  singleFields.forEach(function(id) { var el = document.getElementById(id); if (el) el.parentElement.style.display = isBatch ? 'none' : ''; });
  document.getElementById('qe-batch-panel').style.display = isBatch ? '' : 'none';
  document.getElementById('qe-batch-save-btn').style.display = 'none';
  document.getElementById('qe-batch-gen-btn').style.display = isBatch ? '' : 'none';
  var cancelBtn = document.querySelector('.qe-sheet .qe-btn-cancel'); 
  if (cancelBtn) cancelBtn.parentElement.style.display = isBatch ? 'none' : ''; // hide original save/cancel for batch
  batchResults = [];
  document.getElementById('qe-batch-results').innerHTML = '';
  document.getElementById('qe-batch-progress').textContent = '';
  
  // Populate batch section datalist
  var secInput = document.getElementById('qe-batch-section');
  if (!secInput) {
    secInput = document.getElementById('qe-section').cloneNode();
    secInput.id = 'qe-batch-section';
    secInput.placeholder = '章节（和单题共享）';
    document.getElementById('qe-batch-panel').insertBefore(secInput, document.getElementById('qe-batch-questions'));
    // Add label
    var lbl = document.createElement('label');
    lbl.textContent = '章节';
    lbl.style.cssText = 'font-size:13px;color:var(--ink-muted);margin:10px 0 4px;display:block;';
    document.getElementById('qe-batch-panel').insertBefore(lbl, secInput);
  }
  const sel = document.getElementById('qe-subject');
  sel.innerHTML = data.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  
  // Populate section suggestions
  const secInput = document.getElementById('qe-section');
  secInput.setAttribute('list', 'qe-section-list');
  let datalist = document.getElementById('qe-section-list');
  if (!datalist) {
    datalist = document.createElement('datalist');
    datalist.id = 'qe-section-list';
    secInput.parentNode.insertBefore(datalist, secInput.nextSibling);
  }
  const sections = new Set();
  data.subjects.forEach(s => s.sessions.forEach(ss => sections.add(ss.label)));
  datalist.innerHTML = Array.from(sections).map(s => `<option value="${s}">`).join('');
}
function closeQEditor(e) { if (!e || e.target === document.getElementById('qe-overlay')) { document.getElementById('qe-overlay').classList.remove('show'); } }
async function aiFillQA(e) {
  const question = document.getElementById('qe-question').value.trim();
  if (!question) { alert('请先填写题目'); return; }

  try { const raw = localStorage.getItem('chat_api_key'); if (raw) chatApiKey = atob(raw); } catch(e) {}
  if (!chatApiKey) { alert('请先在聊天面板配置 DeepSeek API Key'); return; }

  const btn = e.target;
  btn.disabled = true;
  let context = '';
  let sourceName = '';

  try {
    // Step 1: Try Wikipedia first
    btn.textContent = '🔍 搜索维基百科...';
    const wikiUrl = 'https://zh.wikipedia.org/w/api.php?action=opensearch&search=' + encodeURIComponent(question) + '&limit=3&format=json&origin=*';
    const wr = await fetch(wikiUrl);
    const wdata = await wr.json();
    const titles = wdata[1] || [];

    if (titles.length > 0) {
      btn.textContent = '📖 阅读维基百科...';
      const contentUrl = 'https://zh.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(titles[0]) + '&prop=extracts&exintro=1&explaintext=1&format=json&origin=*';
      const cr = await fetch(contentUrl);
      const cdata = await cr.json();
      const pages = cdata.query?.pages || {};
      const page = Object.values(pages)[0];
      if (page?.extract) { context = page.extract.substring(0, 2000); sourceName = '中文维基百科'; }
    }

    // Step 2: Fallback to Baidu Baike via Jina reader if Wikipedia failed
    if (!context) {
      btn.textContent = '🔍 搜索百度百科...';
      try {
        const baiduUrl = 'https://r.jina.ai/https://baike.baidu.com/item/' + encodeURIComponent(question.replace(/[？?]/g,''));
        const br = await fetch(baiduUrl);
        if (br.ok) {
          const btext = await br.text();
          if (btext && btext.length > 200) {
            context = btext.substring(0, 2500);
            sourceName = '百度百科';
          }
        }
      } catch(be) { /* fallback failed, try without Jina *//* fallback failed */ }
    }

    // Step 3: Generate answer
    btn.textContent = '🤖 生成答案中...';
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 25000);

    const prompt = context
      ? '根据以下' + sourceName + '资料回答问题。返回JSON格式：{"answer":"...","tips":"..."}\n\n📚 资料（来源：' + sourceName + '）：\n' + context + '\n\n❓ 问题：' + question
      : '根据你的知识回答问题。返回JSON格式：{"answer":"...","tips":"..."}\n\n问题：' + question;

    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + chatApiKey },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: '你是考试题库查证助手。答案要准确简洁，用<b>标签加粗关键词。适合表格的内容用HTML表格（<table><tr><th>...</th></tr><tr><td>...</td></tr></table>）。返回JSON：{"answer":"答案","tips":"记忆提示"}' },
          { role: 'user', content: prompt }
        ],
        max_tokens: 800,
        temperature: 0.3
      }),
      signal: controller.signal
    });
    clearTimeout(t);

    const data = await resp.json();
    let text = data.choices?.[0]?.message?.content || '';
    try {
      const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
      document.getElementById('qe-answer').value = parsed.answer || '';
      let tip = parsed.tips || '';
      if (context) tip += '\n\n✅ 已自动搜索 ' + sourceName + ' 核实';
      else tip += '\n\n⚠️ 未找到维基百科或百度百科的相关条目，答案基于模型知识生成，请自行核实';
      document.getElementById('qe-tips').value = tip;
    } catch {
      const parts = text.split('\n\n');
      document.getElementById('qe-answer').value = parts[0] || text;
      document.getElementById('qe-tips').value = parts.slice(1).join('\n\n') || '';
    }
  } catch(e) {
    alert('AI查证失败: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '🤖 AI 查证填答案';
  }

function saveQuestion() {
  const sid = document.getElementById('qe-subject').value;
  const section = document.getElementById('qe-section').value.trim();
  const question = document.getElementById('qe-question').value.trim();
  const answer = document.getElementById('qe-answer').value.trim();
  const tips = document.getElementById('qe-tips').value.trim();
  if (!sid || !section || !question || !answer) { alert('请填写科目、章节、题目和答案'); return; }
  
  // Generate unique ID
  const prefix = sid.substring(0, 3);
  const existing = new Set();
  data.subjects.forEach(s => s.sessions.forEach(ss => ss.questions.forEach(q => existing.add(q.id))));
  try {
    const custom = JSON.parse(localStorage.getItem('customQuestions') || '{}');
    for (const e of (custom[sid] || [])) existing.add(e.id);
  } catch(e) {}
  let num = 1;
  while (existing.has(`${prefix}_${String(num).padStart(3,'0')}`)) num++;
  const id = `${prefix}_${String(num).padStart(3,'0')}`;
  
  // Save to localStorage
  const entry = { id, section, question, answer, tips };
  try {
    const custom = JSON.parse(localStorage.getItem('customQuestions') || '{}');
    if (!custom[sid]) custom[sid] = [];
    custom[sid].push(entry);
    localStorage.setItem('customQuestions', JSON.stringify(custom));
  } catch(e) { alert('保存失败: ' + e.message); return; }
  
  // Show success
  document.getElementById('qe-saved').style.display = 'block';
  document.getElementById('qe-question').value = '';
  document.getElementById('qe-answer').value = '';
  document.getElementById('qe-tips').value = '';
  setTimeout(() => location.reload(), 600);
}

// ── Batch Editor ──
let batchResults = [];

function openBatchEditor() {
  try {
    const AUTH_KEY = 'qe_authed';
    const EDITOR_PW = 'wys123456';
    if (!localStorage.getItem(AUTH_KEY)) {
      const input = prompt('请输入编辑密码：');
      if (input !== EDITOR_PW) { alert('密码错误'); return; }
      localStorage.setItem(AUTH_KEY, '1');
    }
    var overlay = document.getElementById('qe-batch-overlay');
    if (!overlay) { alert('找不到批量编辑弹窗元素'); return; }
     
    batchResults = [];
    var resultsDiv = document.getElementById('qe-batch-results');
    if (resultsDiv) resultsDiv.innerHTML = '';
    var progressDiv = document.getElementById('qe-batch-progress');
    if (progressDiv) progressDiv.textContent = '';
    var saveBtn = document.getElementById('qe-batch-save-btn');
    if (saveBtn) saveBtn.style.display = 'none';
    overlay.style.display = "flex";
    var sel = document.getElementById('qe-batch-subject');
    if (sel) sel.innerHTML = data.subjects.map(function(s) { return '<option value="' + s.id + '">' + s.name + '</option>'; }).join('');
    var secInput = document.getElementById('qe-batch-section');
    if (secInput) {
      secInput.setAttribute('list', 'qe-section-list-batch');
      var dl = document.getElementById('qe-section-list-batch');
      if (!dl) { dl = document.createElement('datalist'); dl.id = 'qe-section-list-batch'; secInput.parentNode.insertBefore(dl, secInput.nextSibling); }
      var sections = new Set();
      data.subjects.forEach(function(s) { s.sessions.forEach(function(ss) { sections.add(ss.label); }); });
      dl.innerHTML = Array.from(sections).map(function(s) { return '<option value="' + s + '">'; }).join('');
    }
  } catch(e) { alert('批量编辑器错误: ' + e.message); }
}

function closeBatchEditor(e) {
  if (!e || e.target === document.getElementById('qe-batch-overlay')) {
    document.getElementById('qe-batch-overlay').style.display = 'none';
  }
}

async function batchGenerateAnswers() {
  var questions = document.getElementById('qe-batch-questions').value.trim();
  if (!questions) { alert('请先在文本框输入题目（每行一题）'); return; }
  try { var raw = localStorage.getItem('chat_api_key'); if (raw) chatApiKey = atob(raw); } catch(e) {}
  if (!chatApiKey) { alert('请先在聊天面板配置 DeepSeek API Key'); return; }

  var lines = questions.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 3; });
  if (lines.length === 0) { alert('请每行输入一题'); return; }

  var btn = document.getElementById('qe-batch-gen-btn');
  btn.disabled = true;
  batchResults = [];
  document.getElementById('qe-batch-results').innerHTML = '';

  for (var i = 0; i < lines.length; i++) {
    var q = lines[i];
    document.getElementById('qe-batch-progress').textContent = '正在查证 ' + (i+1) + '/' + lines.length + '...';

    var context = '', sourceName = '';
    try {
      var wikiUrl = 'https://zh.wikipedia.org/w/api.php?action=opensearch&search=' + encodeURIComponent(q) + '&limit=3&format=json&origin=*';
      var wr = await fetch(wikiUrl);
      var wdata = await wr.json();
      var titles = wdata[1] || [];
      if (titles.length > 0) {
        var contentUrl = 'https://zh.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(titles[0]) + '&prop=extracts&exintro=1&explaintext=1&format=json&origin=*';
        var cr = await fetch(contentUrl);
        var cdata = await cr.json();
        var pages = cdata.query?.pages || {};
        var page = Object.values(pages)[0];
        if (page?.extract) { context = page.extract.substring(0, 2000); sourceName = '中文维基百科'; }
      }
      if (!context) {
        try {
          var baiduUrl = 'https://r.jina.ai/https://baike.baidu.com/item/' + encodeURIComponent(q.replace(/[?？]/g,''));
          var br = await fetch(baiduUrl);
          if (br.ok) { var bt = await br.text(); if (bt && bt.length > 200) { context = bt.substring(0, 2500); sourceName = '百度百科'; } }
        } catch(e) {}
      }
    } catch(e) {}

    try {
      var prompt = context
        ? '根据以下' + sourceName + '资料回答问题。返回JSON：{"answer":"答案（用<b>标签加粗关键词）","tips":"记忆提示"}\n\n📚资料：' + context + '\n\n❓问题：' + q
        : '回答此问题。返回JSON格式：{"answer":"答案（用<b>标签加粗关键词）","tips":"记忆提示"}\n\n问题：' + q;

      var resp = await fetch(DEEPSEEK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + chatApiKey },
        body: JSON.stringify({ model: 'deepseek-v4-flash', messages: [{ role: 'system', content: '考试题库查证助手。答案准确简洁。' }, { role: 'user', content: prompt }], max_tokens: 600, temperature: 0.3 })
      });
      var data = await resp.json();
      var text = data.choices?.[0]?.message?.content || '';
      var answer = '', tips = '';
      try { var p = JSON.parse(text.replace(/\`\`\`json|\`\`\`/g, '').trim()); answer = p.answer || ''; tips = p.tips || ''; } catch(err) { var pts = text.split('\n\n'); answer = pts[0] || text; tips = pts.slice(1).join(' ') || ''; }
      if (context) tips += '\n✅ ' + sourceName + ' 核实';
      else tips += '\n⚠️ 基于模型知识';
      batchResults.push({ question: q, answer: answer, tips: tips });
    } catch(e) {
      batchResults.push({ question: q, answer: '生成失败: ' + e.message, tips: '' });
    }

    renderBatchResults();
    await new Promise(function(r) { setTimeout(r, 300); });
  }

  document.getElementById('qe-batch-progress').textContent = '✅ 完成 ' + lines.length + ' 题';
  document.getElementById('qe-batch-save-btn').style.display = '';
  btn.disabled = false;
}

function renderBatchResults() {
  var el = document.getElementById('qe-batch-results');
  el.innerHTML = batchResults.map(function(r, i) {
    return '<div class="qe-batch-item"><div class="q">' + (i+1) + '. ' + r.question + '</div><div class="a" id="ba-' + i + '">' + r.answer + '</div><div class="actions"><button onclick="editBatchAnswer(' + i + ')">✏️ 编辑</button><button onclick="deleteBatchItem(' + i + ')">🗑 删除</button></div></div>';
  }).join('');
}

function editBatchAnswer(i) {
  var el = document.getElementById('ba-' + i);
  if (el.classList.contains('edit-mode')) {
    el.classList.remove('edit-mode');
    el.setAttribute('contenteditable', 'false');
    batchResults[i].answer = el.innerText;
  } else {
    el.classList.add('edit-mode');
    el.setAttribute('contenteditable', 'true');
    el.focus();
  }
}

function deleteBatchItem(i) { batchResults.splice(i, 1); renderBatchResults(); }

function batchSaveAll() {
  var sid = document.getElementById('qe-subject').value;
  var section = document.getElementById('qe-batch-section').value.trim();
  if (!sid || !section || batchResults.length === 0) { alert('请填写科目、章节并生成答案'); return; }
  try {
    var custom = JSON.parse(localStorage.getItem('customQuestions') || '{}');
    if (!custom[sid]) custom[sid] = [];
    var existing = new Set();
    data.subjects.forEach(function(s) { s.sessions.forEach(function(ss) { ss.questions.forEach(function(q) { existing.add(q.id); }); }); });
    for (var j = 0; j < (custom[sid] || []).length; j++) { existing.add(custom[sid][j].id); }
    var prefix = sid.substring(0, 3);
    var num = 1;
    batchResults.forEach(function(r) {
      while (existing.has(prefix + '_' + String(num).padStart(3, '0'))) num++;
      var id = prefix + '_' + String(num).padStart(3, '0');
      existing.add(id);
      custom[sid].push({ id: id, section: section, question: r.question, answer: r.answer, tips: r.tips });
      num++;
    });
    localStorage.setItem('customQuestions', JSON.stringify(custom));
    alert('已保存 ' + batchResults.length + ' 题到 ' + section);
    document.getElementById('qe-batch-overlay').style.display = 'none';
    setTimeout(function() { location.reload(); }, 600);
  } catch(e) { alert('保存失败: ' + e.message); }
}


function exportQuestions() {
  // Merge custom questions into data
  try {
    const custom = JSON.parse(localStorage.getItem('customQuestions') || '{}');
    const exportData = JSON.parse(JSON.stringify(data));
    for (const sid of Object.keys(custom)) {
      const subj = exportData.subjects.find(s => s.id === sid);
      if (subj) {
        for (const entry of custom[sid]) {
          let ses = subj.sessions.find(s => s.date === entry.section);
          if (!ses) {
            ses = { date: entry.section, label: entry.section, questions: [] };
            subj.sessions.push(ses);
          }
          ses.questions.push({ id: entry.id, question: entry.question, answer: entry.answer, tips: entry.tips || '', section: entry.section });
        }
      }
    }
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'questions.json';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) { alert('导出失败: ' + e.message); }
}

async function loadData() {
  try {
    const res = await fetch('/study-quiz/questions.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    // Merge custom questions from localStorage
    try {
      const custom = JSON.parse(localStorage.getItem('customQuestions') || '{}');
      for (const sid of Object.keys(custom)) {
        const subj = data.subjects.find(s => s.id === sid);
        if (subj) {
          for (const entry of custom[sid]) {
            let ses = subj.sessions.find(s => s.date === entry.section);
            if (!ses) {
              ses = { date: entry.section, label: entry.section, questions: [] };
              subj.sessions.push(ses);
            }
            ses.questions.push({ id: entry.id, question: entry.question, answer: entry.answer, tips: entry.tips || '', section: entry.section });
          }
        }
      }
    } catch(e) {}
    renderSubjects();
    renderStats();
    restoreState();
  } catch(e) {
    const el = document.getElementById('subject-list');
    el.textContent = '';
    const d = document.createElement('div');
    d.textContent = '题库加载失败 (' + e.message + ')';
    d.style.cssText = 'color:var(--red);text-align:center;padding:40px 0;';
    el.appendChild(d);
  }
}

function getProgressKey(s, d) { return STORAGE_PREFIX + s + '_' + d; }

function loadProgress(sid, date) {
  const key = getProgressKey(sid, date);
  try {
    const saved = localStorage.getItem(key);
    if (saved) { const p = JSON.parse(saved); answers = p.answers || {}; currentIndex = p.currentIndex || 0; return; }
  } catch(e) {}
  answers = {}; currentIndex = 0;
}

function saveProgress(sid, date) { localStorage.setItem(getProgressKey(sid, date), JSON.stringify({ answers, currentIndex })); }

function getStats(sid, date, questions) {
  const key = getProgressKey(sid, date);
  try {
    const saved = localStorage.getItem(key);
    if (saved) { const p = JSON.parse(saved); const ans = p.answers || {}; const total = Object.keys(ans).length; const correct = Object.values(ans).filter(v => v === 'correct').length; return { done: total, correct, total, all: questions.length }; }
  } catch(e) {}
  return { done: 0, correct: 0, total: 0, all: questions.length };
}

// ── Stats ──

function renderStats() {
  let totalQ = 0, totalDone = 0, totalCorrect = 0;
  data.subjects.forEach(s => s.sessions.forEach(sess => {
    const st = getStats(s.id, sess.date, sess.questions);
    totalQ += st.all; totalDone += st.done; totalCorrect += st.correct;
  }));
  const pct = totalDone > 0 ? Math.round(totalCorrect / totalDone * 100) : 0;
  document.getElementById('stats-bar').innerHTML =
    `<div class="stat-card stat-blue"><div class="v">${totalQ}</div><div class="l">总题数</div></div>` +
    `<div class="stat-card stat-amber"><div class="v">${totalDone}</div><div class="l">已答题</div></div>` +
    `<div class="stat-card stat-green"><div class="v">${pct}%</div><div class="l">正确率</div></div>`;
}

// ── Wrong Bank ──

function getAllWrongAnswers() {
  const result = [];
  data.subjects.forEach(s => s.sessions.forEach(sess => {
    const key = getProgressKey(s.id, sess.date);
    try {
      const saved = localStorage.getItem(key);
      if (!saved) return;
      const p = JSON.parse(saved); const ans = p.answers || {};
      sess.questions.forEach(q => {
        if (ans[q.id] === 'wrong') result.push({ ...q, subject: s.name, subjectId: s.id, sessionDate: sess.date, date: sess.date });
      });
    } catch(e) {}
  }));
  return result;
}

function showWrongBank() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-wrongbank').classList.add('active');
  renderWrongBank();
  saveState('wrongbank');
}

function renderWrongBank() {
  const wrongs = getAllWrongAnswers();
  const el = document.getElementById('wb-content');
  if (wrongs.length === 0) {
    el.innerHTML = '<div class="wb-empty"><div class="icon">🎉</div><div class="t">没有错题</div><div class="s">继续保持！</div></div>';
    return;
  }
  const groups = {};
  wrongs.forEach(w => { if (!groups[w.subject]) groups[w.subject] = []; groups[w.subject].push(w); });

  el.innerHTML = Object.entries(groups).map(([subject, items]) =>
    `<div class="wb-group"><div class="wb-subject">${subject} <span class="c">${items.length} 题</span></div>` +
    items.map(w => `<div class="wb-item"><div class="wb-q">${w.question}</div><div class="wb-a">${w.answer}</div><div class="wb-src">${w.date} <span class="num" style="color:var(--ink-blue);text-decoration:underline;margin-left:8px;" onclick="removeWrongAnswer('${w.subjectId}','${w.sessionDate}','${w.id}')">移出</span></div></div>`).join('') +
    `<button class="btn btn-primary" onclick="quizWrongBank('${subject}')">复习这${items.length}题</button></div>`
  ).join('');
}

function quizWrongBank(subject) {
  const wrongs = getAllWrongAnswers().filter(w => w.subject === subject);
  if (wrongs.length === 0) return;
  currentSubject = data.subjects.find(s => s.name === subject);
  currentSession = { date: 'wrong-bank', label: '错题复习', questions: wrongs };
  answers = {}; currentIndex = 0; sessionQuestions = null; isAnswered = false;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-quiz').classList.add('active');
  document.getElementById('quiz-title').textContent = subject + ' 错题';
  renderQuestion();
}

// ── Subject & Session ──

// ── State persistence ──
function saveState(page, sid, date, idx) {
  localStorage.setItem(STATE_KEY, JSON.stringify({ page, subjectId: sid, sessionDate: date, questionIndex: idx }));
}
function clearState() { localStorage.removeItem(STATE_KEY); }
function restoreState() {
  try {
    const saved = localStorage.getItem(STATE_KEY);
    if (!saved) { showHome(); return; }
    const s = JSON.parse(saved);
    if (s.page === 'quiz' && s.subjectId && s.sessionDate) {
      const sub = data.subjects.find(x => x.id === s.subjectId);
      if (!sub) { showHome(); return; }
      currentSubject = sub;
      const sess = sub.sessions.find(x => x.date === s.sessionDate);
      if (!sess) { showHome(); return; }
      currentSession = sess;
      loadProgress(s.subjectId, s.sessionDate);
      currentIndex = Math.min(s.questionIndex || 0, sess.questions.length - 1);
      sessionQuestions = null;
      isAnswered = false;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-quiz').classList.add('active');
      document.getElementById('quiz-title').textContent = sub.name;
      renderQuestion();
    } else if (s.page === 'sessions' && s.subjectId) {
      const sub = data.subjects.find(x => x.id === s.subjectId);
      if (!sub) { showHome(); return; }
      currentSubject = sub;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-sessions').classList.add('active');
      document.getElementById('session-title').textContent = sub.name;
      renderSessions();
    } else if (s.page === 'wrongbank') {
      showWrongBank();
    } else if (s.page === 'notes') {
      showNotes();
    } else if (s.page === 'map') {
      showMap();
    } else { showHome(); }
  } catch(e) { showHome(); }
}

function showHome() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  renderSubjects(); renderStats();
}

const ICON_CLS = ['blue','amber','green','red'];

function renderSubjects() {
  const el = document.getElementById('subject-list');
  // Sort subjects by saved order
  const order = getSubjectOrder();
  const sorted = [...data.subjects].sort((a, b) => {
    const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
  el.innerHTML = sorted.map((s, i) => {
    const allQ = s.sessions.reduce((a, sess) => a + sess.questions.length, 0);
    let totalDone = 0, totalCorrect = 0;
    s.sessions.forEach(sess => { const st = getStats(s.id, sess.date, sess.questions); totalDone += st.done; totalCorrect += st.correct; });
    const done = totalDone === allQ;
    const st = totalDone === 0 ? 'new' : done ? 'done' : 'doing';
    let stamp;
    if (totalDone === 0) stamp = `<span class="stamp stamp-${st}"><span class="stamp-num">0</span><span class="stamp-lbl">${allQ}</span></span>`;
    else { const pct = Math.round(totalCorrect / totalDone * 100); stamp = `<span class="stamp stamp-${st}"><span class="stamp-num">${totalDone}</span><span class="stamp-lbl">${allQ} · ${pct}%</span></span>`; }
    return `<div class="card" draggable="true" data-id="${s.id}" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" onclick="selectSubject('${s.id}')"><div class="card-row"><div class="card-icon ${ICON_CLS[i%4]}">${s.icon && s.icon.indexOf('.svg') > 0 ? '<img src="'+s.icon+'" alt="" style="width:24px;height:24px;display:block;">' : (s.icon || '📖')}</div><div class="card-body"><div class="card-name">${s.name}</div><div class="card-meta">${s.sessions.length} 章 · ${allQ} 题</div></div>${stamp}</div></div>`;
  }).join('');
  // Enable sorting
  setTimeout(enableSorting, 50);
}

// ── Sortable subjects ──
let dragEl = null;

function getSubjectOrder() {
  try { return JSON.parse(localStorage.getItem('subjectOrder') || '[]'); } catch(e) { return []; }
}
function saveSubjectOrder(order) {
  localStorage.setItem('subjectOrder', JSON.stringify(order));
}

function onDragStart(e) {
  dragEl = e.target.closest('.card');
  dragEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragEl.dataset.id);
}

function onDragEnd(e) {
  document.querySelectorAll('#subject-list .card').forEach(c => {
    c.style.transform = ''; c.classList.remove('drop-before', 'drop-after', 'dragging');
  });
  document.querySelectorAll('.sort-indicator').forEach(el => el.remove());
  dragEl = null;
}

function enableSorting() {
  const list = document.getElementById('subject-list');
  list.addEventListener('dragover', onDragOver);
  list.addEventListener('drop', onDrop);
  // Mobile: long press hint only
  let longPressTimer = null;
  list.querySelectorAll('.card').forEach(card => {
    card.addEventListener('touchstart', function(e) {
      longPressTimer = setTimeout(() => {
        this.style.borderColor = 'var(--ink-blue)';
        setTimeout(() => this.style.borderColor = '', 800);
      }, 400);
    }, {passive: true});
    card.addEventListener('touchmove', () => clearTimeout(longPressTimer), {passive: true});
    card.addEventListener('touchend', () => clearTimeout(longPressTimer));
  });
}

function onDragOver(e) {
  e.preventDefault();
  const target = e.target.closest('.card');
  if (!target || target === dragEl) return;
  
  // Smooth visual offset on the target card
  document.querySelectorAll('#subject-list .card').forEach(c => c.classList.remove('drop-before', 'drop-after'));
  const rect = target.getBoundingClientRect();
  target.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drop-before' : 'drop-after');
}

function onDrop(e) {
  e.preventDefault();
  if (!dragEl) return;
  
  // Find insertion point from visual state
  const cards = Array.from(document.querySelectorAll('#subject-list .card'));
  let beforeIdx = -1;
  for (let i = 0; i < cards.length; i++) {
    if (cards[i] === dragEl) continue;
    if (cards[i].classList.contains('drop-before')) { beforeIdx = i; break; }
    if (cards[i].classList.contains('drop-after')) { beforeIdx = i + 1; break; }
  }
  
  // Clear all visual states
  cards.forEach(c => { c.style.transform = ''; c.classList.remove('drop-before', 'drop-after', 'dragging'); });
  
  // Reorder in DOM
  const list = document.getElementById('subject-list');
  if (beforeIdx >= 0 && beforeIdx < cards.length) {
    list.insertBefore(dragEl, cards[beforeIdx]);
  } else {
    list.appendChild(dragEl);
  }
  
  // Save order
  const newOrder = Array.from(document.querySelectorAll('#subject-list .card')).map(c => c.dataset.id);
  saveSubjectOrder(newOrder);
  const newSubjects = [];
  newOrder.forEach(id => { const s = data.subjects.find(x => x.id === id); if (s) newSubjects.push(s); });
  data.subjects.forEach(s => { if (!newOrder.includes(s.id)) newSubjects.push(s); });
  data.subjects = newSubjects;
  
  dragEl = null;
}

function selectSubject(sid) {
  currentSubject = data.subjects.find(s => s.id === sid);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-sessions').classList.add('active');
  document.getElementById('session-title').textContent = currentSubject.name;
  renderSessions();
  saveState('sessions', sid);
}

function renderSessions() {
  const el = document.getElementById('session-list');
  el.innerHTML = currentSubject.sessions.map(sess => {
    const st = getStats(currentSubject.id, sess.date, sess.questions);
    const pct = st.all > 0 ? Math.round(st.done / st.all * 100) : 0;
    return `<div class="row" onclick="selectSession('${sess.date}')"><div class="row-body"><div class="row-date">${sess.date}</div><div class="row-meta">${sess.label || ''} · ${sess.questions.length} 题</div><div class="row-stat">已答 ${st.done}/${st.all} · 正确 ${st.correct}/${st.done}</div><div class="track"><div class="track-fill" style="width:${pct}%"></div></div></div><button class="row-reset" onclick="event.stopPropagation();resetSession('${currentSubject.id}','${sess.date}')">↻</button></div>`;
  }).join('');
}

function selectSession(date) {
  currentSession = currentSubject.sessions.find(s => s.date === date);
  loadProgress(currentSubject.id, date);
  currentIndex = Math.min(currentIndex, currentSession.questions.length - 1);
  sessionQuestions = null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-quiz').classList.add('active');
  document.getElementById('quiz-title').textContent = currentSubject.name;
  isAnswered = false;
  renderQuestion();
  saveState('quiz', currentSubject.id, date, currentIndex);
}

function quitQuiz() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-sessions').classList.add('active');
  renderSessions(); renderStats();
  saveState('sessions', currentSubject.id);
}

// ── Quiz ──

function renderQuestion() {
  const qs = sessionQuestions || currentSession.questions;
  if (!currentSession || currentIndex >= qs.length) { showResult(); return; }
  const q = qs[currentIndex];
  document.getElementById('quiz-progress').textContent = `${currentIndex + 1}/${qs.length}`;
  document.getElementById('quiz-section').textContent = q.section || '';
  const statusIcon = answers[q.id] ? (answers[q.id] === 'correct' ? ' ✅' : ' ❌') : '';
  document.getElementById('q-number').textContent = '#' + (currentIndex + 1) + statusIcon;
  document.getElementById('q-text').textContent = q.question;
  const imgDiv = document.getElementById('q-image');
  const imgTag = document.getElementById('q-img-tag');
  if (q.image) { imgTag.src = q.image; imgDiv.style.display = 'block'; }
  else { imgDiv.style.display = 'none'; }
  document.getElementById('answer-text').innerHTML = q.answer;
  document.getElementById('tips-text').innerHTML = q.tips || '';
  const area = document.getElementById('answer-area');
  const showBtn = document.getElementById('btn-show-answer');
  const ansBtns = document.getElementById('btn-group-answer');
  if (answers[q.id]) {
    area.classList.add('show'); showBtn.classList.add('hidden');
    ansBtns.classList.add('hidden'); isAnswered = true;
  } else {
    area.classList.remove('show'); showBtn.classList.remove('hidden');
    ansBtns.classList.remove('hidden'); isAnswered = false;
  }
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex >= (sessionQuestions || currentSession.questions).length - 1;
  document.getElementById('question-area').classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');
}

document.getElementById('btn-show-answer').addEventListener('click', function() {

function goNext() {
  const qs = sessionQuestions || currentSession.questions;

}

function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function showResult() {
  document.getElementById('question-area').classList.add('hidden');
  document.getElementById('result-area').classList.remove('hidden');
  const qs = sessionQuestions || currentSession.questions;
  let correct = 0, wrong = 0; const wrongList = [];
  qs.forEach(q => { if (answers[q.id] === 'correct') correct++; else if (answers[q.id] === 'wrong') { wrong++; wrongList.push(q); } });
  const done = correct + wrong;
  const pct = done > 0 ? Math.round(correct / done * 100) : 0;
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').textContent = `答对 ${correct}/${done} 题（共 ${qs.length} 题，未答 ${qs.length - done} 题）`;
  const wl = document.getElementById('wrong-list');
  if (wrongList.length === 0) wl.innerHTML = '<div style="color:var(--green);font-size:15px;text-align:center;padding:8px 0;">全都答对了！</div>';
  else wl.innerHTML = wrongList.map(q => `<div class="err"><div class="q">${q.question}</div><div class="a">正确答案：${q.answer}</div></div>`).join('');
  document.getElementById('btn-retry-wrong').classList.toggle('hidden', wrongList.length === 0);
  window._wrongList = wrongList;
  renderStats();
}

});

function searchMapLocation() {
  const q = document.getElementById('map-search').value.trim();
  if (!q) return;

  // Try fixed markers first (instant, no network)
  const fix = FIXED_LOCATIONS.find(l => l.name.includes(q));
  if (fix) { mapInstance.setView([fix.lat, fix.lng], 7); return; }

  // Try OpenStreetMap Nominatim (全球位置搜索，free）
  const ctrl = new AbortController();
  const tm = setTimeout(() => ctrl.abort(), 8000);
  fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=3&accept-language=zh', {
    headers: { 'User-Agent': 'StudyQuiz/1.0' },
    signal: ctrl.signal
  })
  .then(r => r.json())
  .then(data => {
    clearTimeout(tm);
    if (data && data.length > 0) {
      const loc = data[0];
      mapInstance.setView([loc.lat, loc.lon], 8);
      L.marker([loc.lat, loc.lon]).addTo(mapInstance)
        .bindPopup('<b>' + escapeHtml(q) + '</b><br><span style="font-size:12px;color:#666;">' + escapeHtml(loc.display_name || '') + '</span>')
        .openPopup();
    } else {
      fallbackSearch(q);
    }
  })
  .catch(() => { clearTimeout(tm); fallbackSearch(q); });
}

function fallbackSearch(q) {
  if (confirm('在线定位不可用，是否在百度地图中查看「' + q + '」的位置？')) {
    window.open('https://map.baidu.com/search/' + encodeURIComponent(q), '_blank');
  }
}

function renderToc() {
  const qs = sessionQuestions || currentSession.questions;
  const grid = document.getElementById('toc-grid');
  grid.innerHTML = qs.map((q, i) => {
    const status = answers[q.id];
    let cls = 'blank';
    if (status === 'correct') cls = 'correct';
    else if (status === 'wrong') cls = 'wrong';
    if (i === currentIndex) cls += ' current';
    return `<div class="toc-dot ${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
  }).join('');
}

function toggleToc() {
  const ov = document.getElementById('toc-overlay');
  ov.classList.toggle('show');
  if (ov.classList.contains('show')) renderToc();
}

function closeToc(e) {
  if (e.target === e.currentTarget) document.getElementById('toc-overlay').classList.remove('show');
}

function jumpTo(i) {
  currentIndex = i; isAnswered = false;
  document.getElementById('toc-overlay').classList.remove('show');

}

function renderNotes() {
  const notes = getNotes();
  const el = document.getElementById('note-list');
  document.getElementById('note-title').value = '';
  document.getElementById('note-body').value = '';
  if (notes.length === 0) {
    el.innerHTML = '<div class="note-empty"><div class="icon">📝</div><div class="t">还没有笔记</div><div class="s">在聊天中获取知识点后粘贴到这里</div></div>';
    return;

  el.innerHTML = notes.map((n, i) =>
    `<div class="note-entry" onclick="showNoteDetail(${i})"><div class="t">${escapeHtml(n.title || '无标题')}</div><div class="m">${n.date}</div></div>`
  ).join('');

function showNoteDetail(idx) {
  const notes = getNotes();
  const n = notes[idx];
  if (!n) return;
  document.getElementById('notes-list-view').style.display = 'none';
  const dv = document.getElementById('notes-detail-view');
  dv.classList.add('show');
  document.getElementById('notes-bar-title').textContent = '📝 笔记详情';
  document.getElementById('note-detail-title').innerHTML = escapeHtml(n.title || '无标题') +
    ' <span class="del" onclick="deleteNote(' + idx + ')">删除</span>';
  document.getElementById('note-detail-body').innerHTML = renderMd(n.body);
  document.getElementById('note-detail-meta').textContent = n.date;
}


function addNote() {
  const title = document.getElementById('note-title').value.trim();
  const body = document.getElementById('note-body').value.trim();
  if (!body) { alert('内容不能为空'); return; }
  const notes = getNotes();
  notes.push({ title: title || '无标题', body, date: new Date().toISOString().slice(0, 10) });
  saveNotes(notes);
  renderNotes();
}

function deleteNote(idx) {
  if (!confirm('确定删除此笔记？')) return;
  const notes = getNotes();
  notes.splice(idx, 1);
  saveNotes(notes);
  showNotes();
}

// Remove wrong answer
function removeWrongAnswer(subjectId, sessionDate, questionId) {
  const key = getProgressKey(subjectId, sessionDate);
  try {
    const saved = localStorage.getItem(key);
    if (!saved) return;
    const p = JSON.parse(saved);
    delete p.answers[questionId];
    localStorage.setItem(key, JSON.stringify(p));
    renderWrongBank();
    renderStats();
  } catch(e) {}
}

// Export / Import
function exportData() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX));
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {} });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'study-quiz-progress.json';
  a.click(); URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const d = JSON.parse(e.target.result);
      Object.keys(d).forEach(k => localStorage.setItem(k, JSON.stringify(d[k])));
      renderSubjects(); renderStats();
      alert('导入成功！共恢复 ' + Object.keys(d).length + ' 条答题记录');
    } catch(e) { alert('导入失败：文件格式不正确'); }
  };
  reader.readAsText(file); event.target.value = '';
}

// ── Chat (Direct DeepSeek) ──
const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
const API_KEY_STORAGE = 'chat_api_key';

let chatHistory = [];
let chatApiKey = '';

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    try { const raw = localStorage.getItem(API_KEY_STORAGE); if (raw) chatApiKey = atob(raw); } catch(e) {}
    if (chatApiKey) {
      document.getElementById('chat-lock').style.display = 'none';
      document.getElementById('chat-main').style.display = 'flex';
      document.getElementById('chat-input').disabled = false;
      document.getElementById('chat-send').disabled = false;
    }
    document.getElementById('chat-input').focus();
  }
}

function saveKey() {
  const key = document.getElementById('chat-api-key').value.trim();
  if (!key || !key.startsWith('sk-')) { alert('请输入有效的 DeepSeek API Key（sk-开头）'); return; }
  chatApiKey = key;
  localStorage.setItem(API_KEY_STORAGE, btoa(key));
  document.getElementById('chat-lock').style.display = 'none';
  document.getElementById('chat-main').style.display = 'flex';
  document.getElementById('chat-input').disabled = false;
  document.getElementById('chat-send').disabled = false;
  document.getElementById('chat-input').focus();
}

function renderMd(s) {
  let h = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Bold
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  h = h.replace(/`(.+?)`/g, '<code>$1</code>');
  // Blockquote
  h = h.replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>');
  // Headers
  h = h.replace(/^#{1,3}\s+(.+)$/gm, '<div class="md-h">$1</div>');
  // Tables: find markdown table patterns (multi-row with separator)
  h = h.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, function(m) {
    const rows = m.trim().split('\n').filter(r => r.trim() && !/^\|[-| :]+\|$/.test(r.trim()));
    let table = '<table>';
    rows.forEach((row, i) => {
      const cells = row.split('|').filter((c, j, a) => j > 0 && j < a.length - 1).map(c => c.trim());
      const tag = i === 0 ? 'th' : 'td';
      table += '<tr>' + cells.map(c => '<' + tag + '>' + c + '</' + tag + '>').join('') + '</tr>';
    });
    return table + '</table>';
  });
  // Lists
  h = h.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>(?:\n|$))+)/g, '<ul>$1</ul>');
  // Line breaks
  return h.replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>').replace(/(<br>)+$/, '');
}

function addMsg(role, text, isThinking, useMd) {
  document.getElementById('chat-empty').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  const content = useMd ? renderMd(text) : text;
  const raw = text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  let html = `<div class="chat-bbl${isThinking ? ' thinking' : ''}" data-raw="${raw}">${content}</div>`;
  if (role === 'ai' && !isThinking) html += `<span class="copy-btn" onclick="copyMsg(this)">复制</span>`;
  div.innerHTML = html;
  document.getElementById('chat-msgs').appendChild(div);
  document.getElementById('chat-msgs').scrollTop = div.scrollHeight;
}

function copyMsg(el) {
  const bbl = el.parentElement.querySelector('.chat-bbl');
  const raw = bbl.getAttribute('data-raw') || bbl.textContent;
  navigator.clipboard.writeText(raw).then(() => { el.textContent = '已复制'; setTimeout(() => { el.textContent = '复制'; }, 1500); }).catch(() => {});
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = ''; input.disabled = true; sendBtn.disabled = true;
  addMsg('user', escapeHtml(msg));

  const waitDiv = document.createElement('div');
  waitDiv.className = 'chat-msg ai';
  waitDiv.innerHTML = '<div class="chat-bbl thinking">思考中...</div>';
  document.getElementById('chat-msgs').appendChild(waitDiv);

  try {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 25000);

    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + chatApiKey },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: '你是一个学习伙伴，帮助用户理解和记忆考试知识。回答要求：\n1. 对比两个事物时必须用表格（格式：| 项目 | A | B |）\n2. 要点用 **加粗** 强调\n3. 分类列举用 - 列表\n4. 重要提示用 > 引用\n5. 段落之间空行分隔\n6. 易混点主动指出\n7. 不知道就说不知道，不要编造，不要闲聊' },
          ...chatHistory.slice(-10),
          { role: 'user', content: msg }
        ],
        max_tokens: 1024,
        temperature: 0.3
      }),
      signal: controller.signal
    });
    clearTimeout(t);
    waitDiv.remove();

    if (!resp.ok) {
      const err = await resp.text();
      if (resp.status === 401) {
        chatApiKey = ''; localStorage.removeItem(API_KEY_STORAGE);
        document.getElementById('chat-main').style.display = 'none';
        document.getElementById('chat-lock').style.display = 'block';
        addMsg('ai', '⚠️ API Key 无效，请重新配置', false);
      } else {
        addMsg('ai', '⚠️ 请求失败 (' + resp.status + ')', false);
      }
      input.disabled = false; sendBtn.disabled = false; return;
    }

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '';

    addMsg('ai', escapeHtml(reply), false, true);
    chatHistory.push({ role: 'user', content: msg });
    chatHistory.push({ role: 'assistant', content: reply });

  } catch(e) {
    waitDiv.remove();
    addMsg('ai', '⚠️ 网络超时，请检查网络连接后重试', false);
  }

  input.disabled = false; sendBtn.disabled = false;
  input.focus();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadData();
</script>
